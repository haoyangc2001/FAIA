project:
  name: FAIA
  full_name: Fulfillment-oriented Assortment and Inventory Allocation
  description: Reproducible engineering entrypoint for the staged FAIA pipeline.
  root: .
  python: python3
  pythonpath: .
  timezone: Asia/Shanghai

defaults:
  data_version: v001
  split_version: split_v001
  candidate_pool_version: candidate_pool_v001
  k_rule_version: k_rule_v001
  assortment_version: assortment_hybrid_v001
  inventory_version: inventory_base_stock_v001
  simulation_rule_version: sim_rule_v001
  cost_config_version: cost_config_v001
  evaluation_id: eval_v001_baseline
  experiment_ids:
    assortment: exp_assortment_v001_topk
    simulation: sim_smoke_v001_no_transfer
    inventory: exp_inventory_v001_base_stock

paths:
  artifacts_dir: artifacts
  run_logs_dir: artifacts/run_logs
  engineering_docs:
    manifest_standards: doc/engineering/manifest_standards.md
    logging_and_error_handling: doc/engineering/logging_and_error_handling.md
  reports:
    data: data/validation/reports/v001_validation_report.md
    assortment: assortment/reports/exp_assortment_v001_topk_assortment_validation_report.md
    simulation: simulation/reports/sim_smoke_v001_no_transfer_validation_report.md
    inventory: inventory/reports/exp_inventory_v001_base_stock_inventory_validation_report.md
    evaluation: evaluation/reports/eval_v001_baseline_report.md
  manifests:
    data: data/versions/v001/manifest.yaml
    assortment: assortment/runs/exp_assortment_v001_topk/assortment_manifest.yaml
    simulation: simulation/runs/sim_smoke_v001_no_transfer/simulation_manifest.yaml
    inventory: inventory/runs/exp_inventory_v001_base_stock/inventory_manifest.yaml
    evaluation: evaluation/runs/eval_v001_baseline/evaluation_manifest.yaml

configs:
  data: data/configs/synthetic_small.yaml
  assortment: assortment/configs/assortment_small.yaml
  simulation: simulation/configs/simulation_small.yaml
  inventory: inventory/configs/inventory_small.yaml
  evaluation: evaluation/configs/evaluation_default.yaml

data_policy:
  csv_storage: git_lfs
  lfs_note: Pull LFS objects before replaying existing v001 CSVs, or regenerate v001 with the data stage.
  regenerate_default_data: true

execution:
  stop_on_failure: true
  capture_output: true
  stdout_tail_lines: 80
  stderr_tail_lines: 80
  log_format: jsonl
  summary_format: json
  failure_behavior: fail_fast
  env:
    PYTHONPATH: .

pipeline:
  stage_order:
    - data
    - assortment
    - simulation
    - inventory
    - evaluation
  stages:
    data:
      description: Generate, process, validate and register the v001 data artifacts.
      commands:
        - name: generate_synthetic_data
          command:
            - "{python}"
            - data/scripts/generate_synthetic_data.py
            - --config
            - "{config:data}"
            - --data-version
            - "{data_version}"
        - name: build_stage1_artifacts
          command:
            - "{python}"
            - data/scripts/build_stage1_artifacts.py
            - --config
            - "{config:data}"
            - --data-version
            - "{data_version}"
        - name: validate_stage1_data
          command:
            - "{python}"
            - data/scripts/validate_stage1_data.py
            - --data-version
            - "{data_version}"
        - name: register_data_version
          command:
            - "{python}"
            - data/scripts/register_data_version.py
            - --data-version
            - "{data_version}"
            - --config
            - "{config:data}"
      expected_outputs:
        - data/synthetic/v001/manifest.yaml
        - data/processed/v001/manifest.yaml
        - data/splits/v001/manifest.yaml
        - data/versions/v001/manifest.yaml
    assortment:
      description: Run and validate the published assortment experiment.
      commands:
        - name: run_assortment
          command:
            - "{python}"
            - assortment/scripts/run_assortment.py
            - --config
            - "{config:assortment}"
        - name: evaluate_assortment
          command:
            - "{python}"
            - assortment/scripts/evaluate_assortment.py
            - --config
            - "{config:assortment}"
        - name: validate_assortment
          command:
            - "{python}"
            - assortment/scripts/validate_assortment_run.py
            - --manifest
            - "{manifest:assortment}"
      expected_outputs:
        - assortment/runs/exp_assortment_v001_topk/assortment_result.csv
        - assortment/runs/exp_assortment_v001_topk/assortment_manifest.yaml
    simulation:
      description: Run and validate the no-transfer simulation baseline.
      commands:
        - name: run_simulation
          command:
            - "{python}"
            - simulation/scripts/run_simulation.py
            - --config
            - "{config:simulation}"
        - name: validate_simulation
          command:
            - "{python}"
            - simulation/scripts/validate_simulation_run.py
            - --manifest
            - "{manifest:simulation}"
      expected_outputs:
        - simulation/runs/sim_smoke_v001_no_transfer/simulation_manifest.yaml
        - simulation/runs/sim_smoke_v001_no_transfer/metrics_summary.json
    inventory:
      description: Run and validate the base-stock inventory allocation baseline.
      commands:
        - name: run_inventory_baseline
          command:
            - "{python}"
            - inventory/scripts/run_inventory_baseline.py
            - --config
            - "{config:inventory}"
        - name: validate_inventory
          command:
            - "{python}"
            - inventory/scripts/validate_inventory_run.py
            - --manifest
            - "{manifest:inventory}"
      expected_outputs:
        - inventory/runs/exp_inventory_v001_base_stock/inventory_manifest.yaml
        - inventory/runs/exp_inventory_v001_base_stock/transfer_recommendation.csv
    evaluation:
      description: Collect, report and validate the unified evaluation run.
      commands:
        - name: collect_results
          command:
            - "{python}"
            - evaluation/scripts/collect_results.py
            - --config
            - "{config:evaluation}"
        - name: build_evaluation_report
          command:
            - "{python}"
            - evaluation/scripts/build_report.py
            - --manifest
            - "{manifest:evaluation}"
        - name: validate_evaluation
          command:
            - "{python}"
            - evaluation/scripts/validate_evaluation_run.py
            - --manifest
            - "{manifest:evaluation}"
      expected_outputs:
        - evaluation/runs/eval_v001_baseline/evaluation_manifest.yaml
        - evaluation/runs/eval_v001_baseline/experiment_registry.csv
        - evaluation/runs/eval_v001_baseline/metrics_summary.csv
        - evaluation/runs/eval_v001_baseline/comparison_table.csv
        - evaluation/reports/eval_v001_baseline_report.md

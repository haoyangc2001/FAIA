version: v001
table: assortment_metrics
description: 选品实验在验证或测试窗口上的评估指标 JSON 契约，可按 overall、FDC 或 category 维度输出。
primary_key:
  - experiment_id
  - assortment_version
  - evaluation_split
  - metric_level
  - metric_key
fields:
  - name: experiment_id
    type: string
    nullable: false
    description: 选品实验 ID。
  - name: data_version
    type: string
    nullable: false
    description: 输入数据版本。
  - name: candidate_pool_version
    type: string
    nullable: false
    description: 候选池生成规则版本。
  - name: k_rule_version
    type: string
    nullable: false
    description: K 值计算规则版本。
  - name: method_version
    type: string
    nullable: false
    description: 选品方法版本。
  - name: assortment_version
    type: string
    nullable: false
    description: 被评估的选品结果版本。
  - name: anchor_date
    type: date
    nullable: false
    description: 选品决策日期。
  - name: effective_start_date
    type: date
    nullable: false
    description: 选品结果开始生效日期。
  - name: effective_end_date
    type: date
    nullable: false
    description: 选品结果结束生效日期。
  - name: evaluation_split
    type: string
    nullable: false
    allowed_values: [train, validation, test]
    description: 指标使用的数据切分。
  - name: evaluation_start_date
    type: date
    nullable: false
    description: 评估窗口开始日期。
  - name: evaluation_end_date
    type: date
    nullable: false
    description: 评估窗口结束日期。
  - name: metric_level
    type: string
    nullable: false
    allowed_values: [overall, fdc, category, temperature_zone]
    description: 指标聚合层级。
  - name: metric_key
    type: string
    nullable: false
    description: 指标层级对应的 key，例如 ALL、FDC001、CAT001。
  - name: fdc_count
    type: integer
    nullable: false
    description: 指标覆盖的 FDC 数。
  - name: selected_sku_count
    type: integer
    nullable: false
    description: 被选中的 SKU-FDC 行数。
  - name: candidate_sku_count
    type: integer
    nullable: false
    description: 候选 SKU-FDC 行数。
  - name: regular_order_count
    type: integer
    nullable: false
    description: 评估窗口内 regular SKU 订单数。
  - name: covered_regular_order_count
    type: integer
    nullable: false
    description: 所有 regular SKU 均被选入对应 FDC 的订单数。
  - name: local_order_fulfillment_rate
    type: float
    nullable: false
    description: 订单结构层面的本地完整覆盖率。
  - name: sku_frequency_recall_at_k
    type: float
    nullable: false
    description: 选中 SKU 覆盖未来 SKU order frequency 的比例。
  - name: ndcg_at_k
    type: float
    nullable: false
    description: 基于未来 SKU order frequency 的 NDCG@K。
  - name: candidate_hit_rate
    type: float
    nullable: false
    description: 未来有需求 SKU 被候选池召回的比例。
  - name: avg_selected_k
    type: float
    nullable: false
    description: 平均每个 FDC 选中的 SKU 数。
  - name: avg_candidate_count
    type: float
    nullable: false
    description: 平均每个 FDC 的候选 SKU 数。
constraints:
  - effective_start_date > anchor_date
  - effective_end_date >= effective_start_date
  - evaluation_start_date >= effective_start_date
  - evaluation_end_date <= effective_end_date
  - evaluation_end_date >= evaluation_start_date
  - fdc_count > 0
  - selected_sku_count >= 0
  - candidate_sku_count >= selected_sku_count
  - regular_order_count >= covered_regular_order_count
  - covered_regular_order_count >= 0
  - local_order_fulfillment_rate between 0 and 1
  - sku_frequency_recall_at_k between 0 and 1
  - ndcg_at_k between 0 and 1
  - candidate_hit_rate between 0 and 1
  - avg_selected_k >= 0
  - avg_candidate_count >= avg_selected_k

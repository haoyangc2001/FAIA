version: v001
table: daily_state
description: 每日 RDC/FDC/SKU 库存状态输出表。
primary_key:
  - experiment_id
  - simulation_date
  - node_id
  - sku_id
fields:
  - name: experiment_id
    type: string
    nullable: false
    description: 仿真实验 ID。
  - name: data_version
    type: string
    nullable: false
    description: 输入数据版本。
  - name: policy_version
    type: string
    nullable: false
    description: 策略版本。
  - name: simulation_rule_version
    type: string
    nullable: false
    description: 仿真规则版本。
  - name: simulation_date
    type: date
    nullable: false
    description: 仿真日期。
  - name: node_id
    type: string
    nullable: false
    description: RDC 或 FDC 节点 ID。
  - name: node_type
    type: string
    nullable: false
    allowed_values: [RDC, FDC]
    description: 仓节点类型。
  - name: sku_id
    type: string
    nullable: false
    description: SKU ID。
  - name: on_hand_qty
    type: integer
    nullable: false
    description: 账面库存。
  - name: reserved_qty
    type: integer
    nullable: false
    description: 预留库存。
  - name: in_transit_qty
    type: integer
    nullable: false
    description: 在途库存。
  - name: available_qty
    type: integer
    nullable: false
    description: 可用库存。
  - name: inventory_position_qty
    type: integer
    nullable: false
    description: 库存位置，available_qty + in_transit_qty。
constraints:
  - on_hand_qty >= 0
  - reserved_qty >= 0
  - in_transit_qty >= 0
  - available_qty >= 0
  - inventory_position_qty = available_qty + in_transit_qty

